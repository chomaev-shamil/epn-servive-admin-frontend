name: deploy admin panel

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push: { branches: [main] }

env:
  VAULT_KEY: epn-servive-admin-frontend
  PROJECT: epn-admin
  APP_PORT: 7011
  ENVIRONMENT: production
  VPS: epn-web

jobs:
  build:
    name: Build Docker

    runs-on: ubuntu-latest

    steps:
      - name: "Get variables from vault"
        uses: hashicorp/vault-action@v2.4.0
        id: getsecrets
        with:
          url: ${{ secrets.VAULT_HOST }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            ops/data/registry REGISTRY | REGISTRY ;
            ops/data/registry REGISTRY_USERNAME | REGISTRY_USERNAME ;
            ops/data/registry REGISTRY_PASSWORD | REGISTRY_PASSWORD ;
            ${{ env.VAULT_KEY }}/data/${{ env.ENVIRONMENT }} NEXT_PUBLIC_BACKEND_URL | NEXT_PUBLIC_BACKEND_URL ;

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker
        run: |
          chmod +x ./.github/scripts/* 2>/dev/null || true
          if [ -f ./.github/scripts/install-docker.bash ]; then
            ./.github/scripts/install-docker.bash
          else
            sudo apt-get update -y
            sudo apt-get install -y ca-certificates curl
            sudo install -m 0755 -d /etc/apt/keyrings
            sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            sudo chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update -y
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          fi

      - name: "Login docker registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.getsecrets.outputs.REGISTRY }}
          username: ${{ steps.getsecrets.outputs.REGISTRY_USERNAME }}
          password: ${{ steps.getsecrets.outputs.REGISTRY_PASSWORD }}

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.getsecrets.outputs.REGISTRY }}
          ECR_REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile . \
            --build-arg NEXT_PUBLIC_BACKEND_URL="${{ steps.getsecrets.outputs.NEXT_PUBLIC_BACKEND_URL }}"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Get variables from vault"
        uses: hashicorp/vault-action@v2.4.0
        id: getsecrets
        with:
          url: ${{ secrets.VAULT_HOST }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            ops/data/registry REGISTRY | REGISTRY ;
            ops/data/registry REGISTRY_USERNAME | REGISTRY_USERNAME ;
            ops/data/registry REGISTRY_PASSWORD | REGISTRY_PASSWORD ;

            vps/data/${{ env.VPS }} HOST_IP | HOST_IP ;
            vps/data/${{ env.VPS }} HOST_PASSWORD | HOST_PASSWORD ;

            ${{ env.VAULT_KEY }}/data/${{ env.ENVIRONMENT }} NEXT_PUBLIC_BACKEND_URL | NEXT_PUBLIC_BACKEND_URL ;

      - name: "Write .env file"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.getsecrets.outputs.HOST_IP }}
          username: "root"
          password: ${{ steps.getsecrets.outputs.HOST_PASSWORD }}
          port: 22
          script: |
            mkdir -p ~/${{ github.repository }} && cd "$_"
            tee .env <<EOF
            # [CONTAINERS] ================================================================================
            APP_PORT=${{ env.APP_PORT }}
            ENVIRONMENT=${{ env.ENVIRONMENT }}

            # [NEXT.JS] ==================================================================================
            NEXT_PUBLIC_BACKEND_URL=${{ steps.getsecrets.outputs.NEXT_PUBLIC_BACKEND_URL }}
            EOF

      - name: "Deploy image to stage"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.getsecrets.outputs.HOST_IP }}
          username: "root"
          password: ${{ steps.getsecrets.outputs.HOST_PASSWORD }}
          port: 22
          script: |
            docker login ${{ steps.getsecrets.outputs.REGISTRY }} -u ${{ steps.getsecrets.outputs.REGISTRY_USERNAME }} -p ${{ steps.getsecrets.outputs.REGISTRY_PASSWORD }}
            docker pull ${{ steps.getsecrets.outputs.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
            docker rm -f ${{ github.event.repository.name }} 2> /dev/null || true
            docker run -d --restart always --network epn-network -p ${{ env.APP_PORT }}:3000 --name ${{ github.event.repository.name }} --env-file ~/${{ github.repository }}/.env ${{ steps.getsecrets.outputs.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
